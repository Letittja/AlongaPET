name: alongapet_app
description: "AlongaPET: Projeto de Bem-Estar Acadêmico"
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: '>=3.0.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter
  
  # Gerenciamento de Estado
  provider: ^6.1.1
  
  # Banco de Dados Local
  sqflite: ^2.3.0
  path_provider: ^2.1.1
  path: ^1.9.0
  
  # Animações do Pet
  lottie: ^2.7.0
  rive: ^0.12.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^2.0.0

flutter:
  uses-material-design: true
  # Caminho liberado para o Andrei e a Duda colocarem as imagens
  assets:
    - assets/images/